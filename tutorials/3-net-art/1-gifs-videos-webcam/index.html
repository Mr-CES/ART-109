<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/3H6LtL_z5jA?si=HQV-vIVvSHHqjks6&mute=1"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        <img src="media/dark-soul.gif" alt="mimic chasing summon" class="mimic-chase">
        <div class="hello-goodbye-div">
            <p>Hello? Goodbye Hello? Goodbye Hello? Goodbye Hello? Goodbye Hello? Goodbye Hello? Goodbye Hello? Goodbye
            </p>
            <img src="media/NothingThereBursting.gif" alt="Nothing There bursting" class="nothing-there-burst">
        </div>
        <!-- autoplay video -->
        <video width="640" height="360" autoplay muted loop>
            <source src="media/two-sides.mp4" type="video/mp4">
        </video>
        <!-- hover video -->
        <video class="hover-video" width="640" height="360" muted loop>
            <source src="media/two-sides.mp4" type="video/mp4">
        </video>
        <video class="hover-video" width="640" height="360" muted loop>
            <source src="media/two-sides.mp4" type="video/mp4">
        </video>
        <!-- click on play video -->
        <video class="click-video" width="640" height="360" muted loop>
            <source src="media/two-sides.mp4" type="video/mp4">
        </video>

        <video id="webcam" autoplay playsinline></video>
    </main>


    <script src="js/video.js"></script>
    <script src="js/webcam.js"></script>
</body>

</html>
